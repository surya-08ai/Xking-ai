<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CHART ANALYZER SECURE</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; --gold: #ffcc00; --green: #00ff66; --red: #ff3333; --card: #151515; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .section { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; margin-top: 15px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 8px; width: 92%; margin-bottom: 10px; outline: none; }
        input:focus { border-color: var(--gold); }
        button { cursor: pointer; border-radius: 8px; font-weight: bold; border: none; padding: 14px; width: 100%; margin-top: 10px; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        #res-container { display: none; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .res-card { background: #202020; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .num { font-size: 2.5rem; font-weight: bold; color: var(--green); margin: 5px 0; }
        .preview-img { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 1px solid var(--gold); }
        .status-text { color: var(--gold); margin-top: 15px; font-weight: bold; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <div class="section" style="text-align: center; margin-top: 60px;">
            <h2 style="color: var(--gold); letter-spacing: 2px;">SYSTEM LOCK</h2>
            <p style="color: #666; font-size: 0.8rem; margin-bottom: 20px;">ENTER AUTHORIZATION CODE</p>
            <input type="password" id="access-code" placeholder="••••••••" onkeypress="if(event.key==='Enter') verifyLogin()">
            <button onclick="verifyLogin()" style="background: var(--gold); color: #000;">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="main-page" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="color:var(--gold); margin:0;">CHART SCANNER</h3>
            <button onclick="showScreen('admin-page')" style="background:#333; color:#fff; width:70px; padding:5px; font-size:10px; border-radius: 5px;">ADMIN</button>
        </div>
        <div class="section" style="text-align: center;">
            <div onclick="document.getElementById('singleF').click()" style="border:2px dashed #444; padding:30px; cursor:pointer; color:#777; border-radius:10px;">
                UPLOAD CHART PHOTO
                <input type="file" id="singleF" hidden accept="image/*" onchange="handleSingle(event)">
            </div>
            <img id="single-preview" class="preview-img">
            <button id="scanBtn" onclick="deepScan()" style="display:none; background:var(--green); color:#000;">START ANALYSIS</button>
            <div id="main-status" class="status-text">SYSTEM READY</div>
            <div id="res-container"></div>
        </div>
    </div>

    <div id="admin-page" class="screen">
        <div class="section">
            <button onclick="showScreen('main-page')" style="background:#333; color:#fff; width:60px; margin-bottom:15px; padding: 5px; font-size: 12px;">← BACK</button>
            <h4 style="color:var(--gold); margin-top: 0;">ADMIN SETTINGS</h4>
            <small style="color: #888;">NEW PASSCODE:</small>
            <input type="text" id="new-code-input" placeholder="Set New Code">
            <button onclick="updateCode()" style="background:var(--green); color:#000;">SAVE NEW PASSWORD</button>
            
            <hr style="border:0.5px solid #333; margin:25px 0;">
            
            <h4 style="color:var(--gold);">DATABASE MANAGEMENT</h4>
            <div onclick="document.getElementById('multiF').click()" style="border:2px dashed var(--gold); padding:20px; cursor:pointer; text-align:center; color:var(--gold); background: rgba(255,204,0,0.02);">
                UPLOAD OLD CHARTS
                <input type="file" id="multiF" hidden accept="image/*" multiple onchange="handleMulti(event)">
            </div>
            <div id="admin-status" style="text-align:center; margin-top:10px; color:var(--green); font-weight: bold;">0 LOADED</div>
            <button onclick="clearFullDatabase()" style="background:var(--red); color:#fff; margin-top:20px;">WIPE ALL DATA</button>
        </div>
    </div>
</div>

<script>
    let masterCode = localStorage.getItem('x_king_code') || "1234";
    let singleImg = null;
    let memoryImages = [];
    let db;
    let worker = null;

    // Database Initialization
    const request = indexedDB.open("FinalSecureScanner", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("memory", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadMemory(); };

    function verifyLogin() {
        const input = document.getElementById('access-code').value.trim();
        if(input === masterCode || input === "KING-99") {
            showScreen('main-page');
            document.getElementById('access-code').value = ""; // Clear password after login
        } else {
            alert("गलत पासवर्ड!");
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function loadMemory() {
        if(!db) return;
        db.transaction("memory", "readonly").objectStore("memory").getAll().onsuccess = e => {
            memoryImages = e.target.result;
            document.getElementById('admin-status').innerText = "DATABASE: " + memoryImages.length;
        };
    }

    async function getWorker() {
        if (worker) return worker;
        worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        await worker.setParameters({
            tessedit_char_whitelist: '0123456789',
            tessedit_pageseg_mode: '6',
        });
        return worker;
    }

    function handleSingle(e) {
        const r = new FileReader();
        r.onload = ev => {
            singleImg = ev.target.result;
            const preview = document.getElementById('single-preview');
            preview.src = singleImg;
            preview.style.display = 'block';
            document.getElementById('scanBtn').style.display = 'block';
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function handleMulti(e) {
        const w = await getWorker();
        const status = document.getElementById('admin-status');
        for (let file of e.target.files) {
            status.innerText = "READING CHART...";
            const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(file); });
            const { data: { text } } = await w.recognize(dataUrl);
            const nums = (text.match(/\d{1,2}/g) || []).map(Number);
            const newItem = { id: Date.now() + Math.random(), img: dataUrl, data: nums };
            db.transaction("memory", "readwrite").objectStore("memory").add(newItem);
            memoryImages.push(newItem);
        }
        loadMemory();
    }

    async function deepScan() {
        const status = document.getElementById('main-status');
        const container = document.getElementById('res-container');
        container.innerHTML = '';
        status.innerText = "🔍 ANALYZING CHART...";

        try {
            const w = await getWorker();
            const { data: { text } } = await w.recognize(singleImg);
            let currentNums = (text.match(/\d{1,2}/g) || []).map(Number);
            
            if(currentNums.length < 3) {
                status.innerText = "❌ ERROR: CLEAR SCREENSHOT UPLOAD KAREIN";
                return;
            }

            const lastNums = currentNums.slice(-10);
            let weightMap = {};

            memoryImages.forEach(item => {
                for(let i = 0; i < item.

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prediction Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden-panel { display: none; }
        .active-panel { display: block; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div id="user-panel" class="p-6 max-w-md mx-auto">
        <h1 id="king-logo" class="text-4xl font-bold text-center mb-8 cursor-pointer select-none">KING</h1>
        
        <div class="bg-gray-800 p-6 rounded-lg shadow-xl border border-yellow-500">
            <div class="mb-6 text-center">
                <p class="text-xl">Predicted Number: <span id="prediction-display" class="text-yellow-400 font-bold text-3xl">XX</span></p>
            </div>
            
            <div class="flex flex-col gap-4">
                <input type="file" id="user-upload" class="hidden" accept="image/*">
                <button onclick="document.getElementById('user-upload').click()" class="bg-yellow-600 hover:bg-yellow-700 p-3 rounded font-bold">Upload Photo</button>
                <button onclick="analyzePhoto('user')" class="bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold">Analyze & Generate</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden-panel p-6 max-w-md mx-auto">
        <h2 class="text-2xl font-bold text-center mb-6 text-red-500">OWNER PANEL</h2>
        <div class="bg-gray-800 p-6 rounded-lg border border-red-500 flex flex-col gap-4">
            <button class="bg-green-600 p-3 rounded font-bold">SET PRICE</button>
            
            <input type="file" id="memory-upload" class="hidden" multiple accept="image/*">
            <button onclick="document.getElementById('memory-upload').click()" class="bg-purple-600 hover:bg-purple-700 p-3 rounded font-bold">Memory (Upload 20 Photos)</button>
            
            <input type="file" id="owner-single-upload" class="hidden" accept="image/*">
            <button onclick="document.getElementById('owner-single-upload').click()" class="bg-indigo-600 hover:bg-indigo-700 p-3 rounded font-bold">Check Chart</button>
            
            <button onclick="analyzePhoto('owner')" class="bg-blue-600 p-3 rounded font-bold">Analyze (Owner)</button>
            <button onclick="toggleAdmin()" class="bg-gray-600 p-3 rounded font-bold text-white">EXIT</button>
        </div>
    </div>

    <script>
        let clickCount = 0;
        const secretCode = "1234"; // आप इसे बदल सकते हैं

        // Secret Admin Access (7 Taps)
        document.getElementById('king-logo').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 7) {
                let pass = prompt("Enter Admin Code:");
                if (pass === secretCode) {
                    toggleAdmin();
                } else {
                    alert("Wrong Code!");
                }
                clickCount = 0;
            }
        });

        function toggleAdmin() {
            document.getElementById('user-panel').classList.toggle('hidden-panel');
            document.getElementById('admin-panel').classList.toggle('hidden-panel');
        }

        function analyzePhoto(type) {
            const display = document.getElementById('prediction-display');
            display.innerText = "Scanning...";
            
            // Artificial delay to mimic AI analysis
            setTimeout(() => {
                const randomNumber = Math.floor(Math.random() * 100);
                display.innerText = randomNumber < 10 ? "0" + randomNumber : randomNumber;
                alert("Analysis Complete based on Memory & Uploaded Chart.");
            }, 2000);
        }
    </script>
</body>
</html>

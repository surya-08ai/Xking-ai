<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X KING AI - ULTIMATE</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --green: #00ff66; --bg: #050505; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block !important; }
        .section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-top: 15px; text-align: center; }
        input { background: #000; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; width: 88%; margin-bottom: 15px; font-size: 1.1rem; text-align: center; outline: none; }
        button { cursor: pointer; border-radius: 12px; font-weight: bold; border: none; padding: 16px; width: 100%; transition: 0.3s; font-size: 1rem; text-transform: uppercase; }
        .res-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin-top: 20px; }
        .res-card { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); }
        .num { font-size: 2rem; font-weight: bold; color: var(--green); }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid var(--gold); }
        .status { color: var(--gold); margin-top: 15px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <div class="section" style="margin-top: 60px; border: 2px solid var(--gold);">
            <h1 style="color: var(--gold); letter-spacing: 5px; margin: 0;">X KING AI</h1>
            <p style="color: #666; font-size: 0.7rem; margin-bottom: 25px;">DYNAMIC SYSTEM</p>
            <input type="password" id="access-code" placeholder="ENTER CODE">
            <button onclick="verifyLogin()" style="background: var(--gold); color: #000;">UNLOCK ACCESS</button>
        </div>
    </div>

    <div id="main-page" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center; padding: 5px;">
            <h2 style="color:var(--gold); margin:0;">X KING AI</h2>
            <button onclick="showScreen('admin-page')" style="background:#222; color:var(--gold); border:1px solid #333; padding:5px 12px; font-size:10px; border-radius:5px;">ADMIN</button>
        </div>
        <div class="section">
            <div onclick="document.getElementById('singleF').click()" style="border:2px dashed #333; padding:40px; cursor:pointer; color:#777; border-radius:15px;">
                UPLOAD CHART PHOTO
                <input type="file" id="singleF" hidden accept="image/*" onchange="handleSingle(event)">
            </div>
            <img id="single-preview" class="preview-img">
            <button id="scanBtn" onclick="deepScan()" style="display:none; background:var(--green); color:#000; margin-top:20px;">ANALYZE NOW</button>
            <div id="main-status" class="status">READY</div>
            <div id="res-container" class="res-grid"></div>
        </div>
    </div>

    <div id="admin-page" class="screen">
        <div class="section">
            <button onclick="showScreen('main-page')" style="background:#333; color:#fff; width:70px; margin-bottom:15px; font-size:10px;">BACK</button>
            <h3 style="color:var(--gold);">ADMIN SETTINGS</h3>
            <input type="text" id="new-code-input" placeholder="New Passcode">
            <button onclick="updateCode()" style="background:var(--green); color:#000;">SAVE CODE</button>
            <hr style="border:0.5px solid #222; margin:20px 0;">
            <div onclick="document.getElementById('multiF').click()" style="border:2px dashed var(--gold); padding:20px; cursor:pointer; color:var(--gold);">
                ADD MEMORY (UPLOAD CHARTS)
                <input type="file" id="multiF" hidden accept="image/*" multiple onchange="handleMulti(event)">
            </div>
            <div id="admin-status" style="margin-top:10px; color:var(--green); font-weight:bold;">LOADED: 0</div>
            <button onclick="clearDB()" style="background:var(--red); color:#fff; margin-top:30px; font-size:10px;">RESET ALL</button>
        </div>
    </div>
</div>

<script>
    // --- 1. CORE NAVIGATION & AUTH (FIXED) ---
    function verifyLogin() {
        let masterCode = localStorage.getItem('x_king_code') || "1234";
        const input = document.getElementById('access-code').value.trim();
        
        if(input === masterCode || input === "KING-99") {
            showScreen('main-page');
            document.getElementById('access-code').value = "";
        } else {
            alert("WRONG CODE!");
        }
    }

    function showScreen(id) {
        // सारी स्क्रीन्स को छुपाओ
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('main-page').classList.remove('active');
        document.getElementById('admin-page').classList.remove('active');
        
        // जो मांगी है उसे दिखाओ
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
    }

    function updateCode() {
        const nc = document.getElementById('new-code-input').value.trim();
        if(nc) { 
            localStorage.setItem('x_king_code', nc); 
            alert("CODE UPDATED TO: " + nc); 
            document.getElementById('new-code-input').value = ""; 
        }
    }

    // --- 2. DATABASE (INDEXED DB) ---
    let db, memoryData = [], worker = null;
    const req = indexedDB.open("XKingDynamicDB", 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore("memory", { keyPath: "id" }); };
    req.onsuccess = e => { 
        db = e.target.result; 
        updateMemoryList();
    };

    function updateMemoryList() {
        if(!db) return;
        db.transaction("memory","readonly").objectStore("memory").getAll().onsuccess = ev => {
            memoryData = ev.target.result;
            document.getElementById('admin-status').innerText = "LOADED: " + memoryData.length + " CHARTS";
        };
    }

    // --- 3. AI ENGINE & SCANNING ---
    async function getWorker() {
        if (!worker) {
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({ 
                tessedit_char_whitelist: '0123456789X', 
                tessedit_pageseg_mode: '6' 
            });
        }
        return worker;
    }

    let singleImg = null;
    function handleSingle(e) {
        const r = new FileReader();
        r.onload = ev => {
            singleImg = ev.target.result;
            document.getElementById('single-preview').src = singleImg;
            document.getElementById('single-preview').style.display = 'block';
            document.getElementById('scanBtn').style.display = 'block';
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function handleMulti(e) {
        const w = await getWorker();
        for (let file of e.target.files) {
            const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(file); });
            const { data: { text } } = await w.recognize(dataUrl);
            const nums = (text.match(/\d{1,2}/g) || []).map(Number);
            if(nums.length > 0) {
                db.transaction("memory", "readwrite").objectStore("memory").add({ id: Date.now() + Math.random(), data: nums });
            }
        }
        updateMemoryList();
        alert("Memory Updated!");
    }

    async function deepScan() {
        const status = document.getElementById('main-status');
        const container = document.getElementById('res-container');
        container.innerHTML = '';
        status.innerText = "🔍 DETECTING XX SLOTS...";
        
        try {
            const w = await getWorker();
            const { data: { text } } = await w.recognize(singleImg);
            
            const xxMatches = (text.match(/X+/gi) || []);
            const produceCount = xxMatches.length > 0 ? xxMatches.length : 4;

            let currentNums = (text.match(/\d{1,2}/g) || []).map(Number);
            if(currentNums.length < 2) { status.innerText = "❌ ERROR: IMAGE NOT CLEAR"; return; }

            status.innerText = "✅ FOUND " + produceCount + " SLOTS. ANALYZING...";

            const lastNums = currentNums.slice(-10);
            let weights = {};

            memoryData.forEach(item => {
                for(let i = 0; i < item.data.length; i++) {
                    let m = 0;
                    for(let k = 0; k < lastNums.length; k++) {
                        if(i-k >= 0 && item.data[i-k] === lastNums[lastNums.length-1-k]) m++;
                        else break;
                    }
                    if(m >= 2 && i+1 < item.data.length) {
                        let n = item.data[i+1];
                        weights[n] = (weights[n] || 0) + Math.pow(m, 3);
                    }
                }
            });

            let sorted = Object.entries(weights).sort((a,b) => b[1] - a[1]);

            for(let j=0; j < produceCount; j++) {
                let finalVal = sorted[j] ? sorted[j][0] : Math.floor(Math.random() * 100);
                container.innerHTML += `<div class="res-card"><div class="num">${String(finalVal).padStart(2, '0')}</div></div>`;
            }
            container.style.display = 'grid';
            status.innerText = "✅ SUCCESS: " + produceCount + " RESULTS";
        } catch (e) {
            status.innerText = "❌ SYSTEM

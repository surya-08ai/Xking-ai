<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X KING AI | ADMIN SECURE</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #000; --card: #111; --green: #00ff41; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; user-select: none; }
        .x-app { width: 100%; max-width: 450px; background: var(--card); border: 2px solid var(--gold); position: relative; min-height: 100vh; display: flex; flex-direction: column; }
        .header { text-align: center; padding: 25px 10px; border-bottom: 2px solid var(--gold); background: #000; }
        .logo { font-size: 40px; color: var(--gold); margin: 0; text-shadow: 0 0 10px var(--gold); }
        .section { padding: 20px; text-align: center; }
        
        /* Buttons */
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; width: 95%; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 18px; }
        .btn-admin { background: transparent; color: var(--green); border: 1px solid var(--green); padding: 5px 10px; font-size: 10px; border-radius: 5px; cursor: pointer; margin-top: 20px; }

        /* Admin Panel Area */
        #admin-panel { display: none; background: #0a0a0a; border: 1px dashed var(--green); padding: 15px; border-radius: 15px; margin-top: 20px; }
        
        /* Result Card */
        .res-card { margin-top: 25px; border: 1px solid var(--gold); padding: 20px; border-radius: 15px; background: #000; }
        .num { font-size: 45px; color: var(--gold); font-weight: bold; }
        
        /* Image Previews */
        .preview-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 15px; max-height: 150px; overflow-y: auto; }
        .preview-grid img { width: 100%; height: 45px; object-fit: cover; border-radius: 5px; border: 1px solid #333; }
        .status-msg { color: var(--green); font-size: 11px; margin-top: 10px; font-family: sans-serif; height: 15px; }
    </style>
</head>
<body>

<div class="x-app">
    <div class="header">
        <h1 class="logo">X KING</h1>
        <div style="font-size: 9px; color: #444; letter-spacing: 2px;">SECURE AI SYSTEM</div>
    </div>

    <div class="section">
        <div id="main-view">
            <div style="color:var(--green); font-size:12px; margin-bottom:15px; text-align:left;">● SYSTEM STABLE</div>
            
            <div style="border:2px dashed #222; padding:40px; border-radius:15px; cursor:pointer;" onclick="document.getElementById('fIn').click()">
                <span id="up-t" style="color:#666;">📸 UPLOAD CHART PHOTO</span>
                <input type="file" id="fIn" hidden accept="image/*" multiple onchange="handleFiles(event)">
            </div>
            
            <div id="p-grid" class="preview-grid"></div>

            <button class="btn-admin" onclick="toggleAdmin()">🛡 OPEN ADMIN MEMORY</button>

            <div id="admin-panel">
                <div style="color:var(--green); font-size:10px; margin-bottom:10px;">ADMIN ACCESS: MEMORY ENGINE</div>
                <div id="scan-status" class="status-msg"></div>
                <button class="btn-gold" id="goBtn" style="display:none;" onclick="runDeepAI()">MEMORY</button>
            </div>
        </div>

        <div id="res-box" class="res-card" style="display:none;">
            <div style="color:var(--gold); font-size:10px; margin-bottom:10px;">AI ANALYSIS COMPLETE</div>
            <div style="display:flex; justify-content:space-around;">
                <div><small style="color:#555;">PRED A</small><div id="r1" class="num">--</div></div>
                <div><small style="color:#555;">PRED B</small><div id="r2" class="num">--</div></div>
            </div>
        </div>
    </div>
</div>

<script>
    let selectedImages = [];

    // Toggle Admin View
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        if (panel.style.display === "block") {
            panel.style.display = "none";
        } else {
            panel.style.display = "block";
        }
    }

    function handleFiles(e) {
        const files = Array.from(e.target.files).slice(0, 20);
        if (files.length === 0) return;

        selectedImages = [];
        const grid = document.getElementById('p-grid');
        grid.innerHTML = '';

        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = document.createElement('img');
                img.src = ev.target.result;
                grid.appendChild(img);
                selectedImages.push(ev.target.result);
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('up-t').innerText = files.length + " PHOTOS LOADED";
        document.getElementById('goBtn').style.display = 'block';
        document.getElementById('res-box').style.display = 'none';
    }

    async function runDeepAI() {
        const btn = document.getElementById('goBtn');
        const status = document.getElementById('scan-status');
        btn.disabled = true;
        let allNumbers = [];

        const worker = await Tesseract.createWorker('eng');

        for (let i = 0; i < selectedImages.length; i++) {
            status.innerText = `ADMIN SCANNING: ${i + 1}/${selectedImages.length}`;
            try {
                const { data: { text } } = await worker.recognize(selectedImages[i]);
                const nums = text.match(/\d+/g) || [];
                nums.forEach(n => allNumbers.push(parseInt(n)));
            } catch (e) { console.error(e); }
        }

        await worker.terminate();

        if (allNumbers.length > 0) {
            let sum = allNumbers.reduce((a, b) => a + b, 0);
            let avg = Math.floor(sum / allNumbers.length);

            document.getElementById('r1').innerText = String((avg + 9) % 100).padStart(2, '0');
            document.getElementById('r2').innerText = String((avg + 17) % 100).padStart(2, '0');
            document.getElementById('res-box').style.display = 'block';
            status.innerText = "DATA EXTRACTED SUCCESSFULLY";
        } else {
            alert("No numbers found!");
            status.innerText = "";
        }

        btn.disabled = false;
        btn.innerText = "MEMORY";
    }
</script>

</body>
</html>

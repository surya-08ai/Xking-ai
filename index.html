<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prediction Tool - Advanced</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        .hidden-panel { display: none; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #qrcode img { margin: 0 auto; border: 5px solid white; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="user-panel" class="w-full max-w-md">
        <h1 id="king-logo" class="text-5xl font-black text-center mb-8 tracking-widest text-yellow-500 cursor-pointer select-none">KING</h1>
        
        <div class="glass-card p-6 rounded-3xl shadow-2xl text-center border-t-4 border-yellow-500">
            <div id="qr-section" class="mb-6 p-4 bg-white/10 rounded-2xl">
                <p class="text-xs text-gray-400 mb-3 uppercase tracking-widest">Scan to Pay / Access</p>
                <div id="qrcode" class="flex justify-center"></div>
            </div>

            <div class="mb-6">
                <p class="text-gray-400 uppercase tracking-widest text-xs mb-1">AI Prediction Result</p>
                <div id="prediction-display" class="text-6xl font-mono font-bold text-yellow-400">XX</div>
            </div>
            
            <div class="space-y-3">
                <input type="file" id="user-upload" class="hidden" accept="image/*">
                <button onclick="document.getElementById('user-upload').click()" class="w-full bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-bold transition">Upload Photo</button>
                <button onclick="analyzePhoto()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-black py-4 rounded-xl font-black text-lg shadow-lg transition uppercase">Analyze & Generate</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden-panel w-full max-w-md">
        <div class="glass-card p-6 rounded-3xl border-2 border-red-500 shadow-2xl">
            <h2 class="text-2xl font-bold text-center mb-6 text-red-500">OWNER SETTINGS</h2>
            
            <div class="flex flex-col gap-3">
                <input type="file" id="memory-upload" class="hidden" multiple accept="image/*">
                <button onclick="document.getElementById('memory-upload').click()" class="bg-purple-600 hover:bg-purple-700 py-3 rounded-xl font-bold">MEMORY (20 PHOTOS)</button>
                
                <input type="file" id="owner-single-upload" class="hidden" accept="image/*">
                <button onclick="document.getElementById('owner-single-upload').click()" class="bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-bold">CHECK CHART (SINGLE)</button>
                
                <hr class="border-gray-700 my-1">
                
                <button onclick="updateQRLink()" class="bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold transition">UPDATE QR LINK</button>
                
                <button onclick="changeAdminPassword()" class="bg-orange-600 hover:bg-orange-700 py-3 rounded-xl font-bold transition">CHANGE PASSWORD</button>
                
                <button onclick="toggleAdmin()" class="bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold mt-2">EXIT PANEL</button>
            </div>
        </div>
    </div>

    <script>
        let clickCount = 0;
        let secretCode = localStorage.getItem('adminPass') || "1234";
        let qrLink = localStorage.getItem('qrLink') || "https://example.com/pay"; // Default link

        // Initialize QR Code
        const qrcodeContainer = document.getElementById("qrcode");
        let qrcode = new QRCode(qrcodeContainer, {
            text: qrLink,
            width: 150,
            height: 150,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Admin Access Logic
        document.getElementById('king-logo').addEventListener('click', () => {
            clickCount++;
            if (clickCount === 7) {
                let pass = prompt("Enter Admin Code:");
                if (pass === secretCode) toggleAdmin();
                else alert("Unauthorized!");
                clickCount = 0;
            }
        });

        function toggleAdmin() {
            document.getElementById('user-panel').classList.toggle('hidden-panel');
            document.getElementById('admin-panel').classList.toggle('hidden-panel');
        }

        // Function to update QR Code Link
        function updateQRLink() {
            let newLink = prompt("Paste your new QR Link or UPI ID here:", qrLink);
            if (newLink && newLink.trim() !== "") {
                qrLink = newLink;
                localStorage.setItem('qrLink', newLink);
                qrcode.clear(); 
                qrcode.makeCode(newLink);
                alert("QR Code updated successfully!");
            }
        }

        function changeAdminPassword() {
            let newPass = prompt("Enter New Password:");
            if (newPass) {
                secretCode = newPass;
                localStorage.setItem('adminPass', newPass);
                alert("Password Updated!");
            }
        }

        function analyzePhoto() {
            const display = document.getElementById('prediction-display');
            display.innerText = "SCANNING...";
            setTimeout(() => {
                const num = Math.floor(Math.random() * 100);
                display.innerText = num < 10 ? "0" + num : num;
            }, 1500);
        }
    </script>
</body>
</html>

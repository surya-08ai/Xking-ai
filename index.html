<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X KING AI - V16 ULTRA ACCURACY</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --green: #00ff66; --bg: #000; --card: #111; --border: #222; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        .screen { display: none; }
        .active { display: block !important; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .section { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-align: center; margin-top: 10px; }
        button { cursor: pointer; border-radius: 12px; font-weight: bold; border: none; padding: 16px; width: 100%; transition: 0.2s; font-size: 1rem; text-transform: uppercase; }
        .btn-green { background: var(--green); color: #000; box-shadow: 0 0 20px rgba(0,255,102,0.4); margin-top: 20px; }
        .res-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 15px; margin-top: 25px; }
        .res-card { background: #000; border: 2.5px solid var(--gold); padding: 15px; border-radius: 15px; overflow: hidden; }
        .num { font-size: 2.8rem; font-weight: bold; color: var(--green); text-shadow: 0 0 10px rgba(0,255,102,0.5); }
        .conf-bar { height: 6px; background: #222; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .conf-fill { height: 100%; background: linear-gradient(90deg, #ff0000, #00ff66); transition: 0.8s ease-out; }
        .upload-area { border: 2px dashed #333; padding: 50px 20px; border-radius: 20px; color: #555; cursor: pointer; }
        #preview { width: 100%; border-radius: 15px; margin: 15px 0; display: none; border: 1.5px solid var(--gold); }
        .status { color: var(--gold); font-size: 12px; margin: 15px 0; font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr_main" class="screen active">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color:var(--gold); margin:0;">X KING <span style="color:#fff;">V16 ULTRA</span></h2>
            <button onclick="nav('scr_admin')" style="width:auto; padding:8px 15px; font-size:10px; background:#222; color:var(--gold); border:1px solid #333;">DATABASE</button>
        </div>

        <div class="section">
            <div id="up_box" class="upload-area" onclick="document.getElementById('file_in').click()">
                करंट चार्ट फोटो लोड करें<br><small>Deep Accuracy Mode Active</small>
                <input type="file" id="file_in" hidden accept="image/*" onchange="handleFile(event)">
            </div>
            <img id="preview">
            <div id="st" class="status">ULTRA AI READY</div>
            <button id="run_btn" class="btn-green" style="display:none;" onclick="deepAnalyze()">ACCURACY सर्च शुरू करें</button>
            <div id="results" class="res-grid"></div>
        </div>
    </div>

    <div id="scr_admin" class="screen">
        <div class="section">
            <button onclick="nav('scr_main')" style="width:auto; background:#333; color:#fff; font-size:10px; padding:10px; margin-bottom:15px;">← वापस</button>
            <h3 style="color:var(--gold);">ULTRA MEMORY</h3>
            <div class="upload-area" style="border-color: var(--gold);" onclick="document.getElementById('admin_in').click()">
                पुराने चार्ट्स का डेटा जोड़ें
                <input type="file" id="admin_in" hidden multiple onchange="train(event)">
            </div>
            <div id="db_st" style="margin-top:20px; color:var(--green); font-weight:bold; font-size: 1.2rem;">DATA: 0</div>
            <button onclick="wipe()" style="background:#f33; color:#fff; font-size:10px; margin-top:40px; opacity:0.5;">WIPE SYSTEM</button>
        </div>
    </div>
</div>

<script>
    let db, memory = [], ai = null;

    const req = indexedDB.open("XKingUltraV16", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("h", {keyPath:"id"});
    req.onsuccess = e => { db = e.target.result; sync(); };

    function sync() {
        db.transaction("h").objectStore("h").getAll().onsuccess = e => {
            memory = e.target.result;
            document.getElementById('db_st').innerText = "DATA: " + memory.length;
        };
    }

    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function getAI() {
        if(!ai) {
            ai = await Tesseract.createWorker();
            await ai.loadLanguage('eng');
            await ai.initialize('eng');
            await ai.setParameters({ tessedit_char_whitelist: '0123456789X', tessedit_pageseg_mode: '6' });
        }
        return ai;
    }

    let imgData = null;
    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            imgData = ev.target.result;
            document.getElementById('preview').src = imgData;
            document.getElementById('preview').style.display = 'block';
            document.getElementById('run_btn').style.display = 'block';
            document.getElementById('up_box').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    async function train(e) {
        const w = await getAI();
        for(let f of e.target.files) {
            const dataUrl = await new Promise(r => { const rd = new FileReader(); rd.onload = ev => r(ev.target.result); rd.readAsDataURL(f); });
            const { data: { text } } = await w.recognize(dataUrl);
            const nums = (text.match(/\d{1,2}/g) || []).map(Number);
            if(nums.length > 2) db.transaction("h","readwrite").objectStore("h").add({id: Date.now()+Math.random(), data: nums});
        }
        sync();
        alert("एक्यूरेसी डेटा अपडेट हो गया!");
    }

    async function deepAnalyze() {
        const st = document.getElementById('st');
        const res = document.getElementById('results');
        res.innerHTML = '';
        st.innerText = "DEEP PATTERN MATCHING...";

        try {
            const w = await getAI();
            const { data: { text } } = await w.recognize(imgData);
            const slots = (text.match(/X+/gi) || []).length;
            const current = (text.match(/\d{1,2}/g) || []).map(Number).slice(-8); 

            if(slots === 0) { st.innerText = "NO XX SLOTS"; return; }

            let matches = {};
            memory.forEach((entry, index) => {
                // Time weighting: newer data gets slightly more importance
                const timeWeight = 1 + (index / memory.length);
                
                for(let i = 0; i < entry.data.length - 1; i++) {
                    let score = 0;
                    for(let k = 0; k < current.length; k++) {
                        if(i - k >= 0 && entry.data[i - k] === current[current.length - 1 - k]) score++;
                        else break;
                    }
                    
                    if(score >= 2) {
                        let n = entry.data[i + 1];
                        if(!matches[n]) matches[n] = { power: 0, hits: 0, bestChain: 0 };
                        matches[n].power += Math.pow(score, 7) * timeWeight;
                        matches[n].hits++;
                        if(score > matches[n].bestChain) matches[n].bestChain = score;
                    }
                }
            });

            let sorted = Object.entries(matches).sort((a,b) => b[1].power - a[1].power);

            for(let j = 0; j < slots; j++) {
                let n = "--", perc = 0, label = "LOW DATA";
                
                if(sorted[j]) {
                    n = String(sorted[j][0]).padStart(2, '0');
                    const best = sorted[j][1].bestChain;
                    // Logic: Higher accuracy if chain is 4 or more
                    perc = Math.min(98, (best / 8) * 100 + (Math.random() * 5));
                    if(best >= 5) label = "ULTRA CONFIRM";
                    else if(best >= 3) label = "STRONG MATCH";
                    else label = "NORMAL MATCH";
                } else {
                    n = Math.floor(Math.random() * 99).toString().padStart(2, '0');
                    perc = Math.floor(Math.random() * 15) + 5;
                    label = "AI GUESS";
                }

                res.innerHTML += `
                <div class="res-card">
                    <small style="font-size:8px; color:#555">ACCURACY SLOT ${j+1}</small>
                    <div class="num">${n}</div>
                    <div style="font-size:10px; color:var(--gold); font-weight:bold">${perc.toFixed(1)}%</div>
                    <div class="conf-bar"><div class="conf-fill" style="width:${perc}%"></div></div>
                    <span style="font-size:8px; color:#aaa; margin-top:5px; display:block">${label}</span>
                </div>`;
            }
            st.innerText = "ANALYSIS COMPLETE";
        } catch(e) { st.innerText = "ERROR"; }
    }

    function wipe() { if(confirm("WIPE EVERYTHING?")) { db.transaction("h","readwrite").objectStore("h").clear(); sync(); } }
</script>
</body>
</html>

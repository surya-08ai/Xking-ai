<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X KING AI - MASTER PATTERN SYSTEM</title>
    <style>
        :root { --neon: #00d2ff; --gold: #ffd700; --bg: #080808; --card: #121212; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        #splash { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center; transition: 1s; }
        .logo-box { text-align: center; border: 2px solid var(--neon); padding: 30px; border-radius: 20px; box-shadow: 0 0 30px var(--neon); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.7; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.7; } }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--neon); }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid #252525; }
        .custom-file { display: block; background: #1a1a1a; border: 2px dashed #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; color: #888; }
        button { background: linear-gradient(45deg, var(--gold), #ff8c00); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; display: none; }
        canvas { max-width: 100%; border-radius: 15px; margin-top: 20px; border: 3px solid var(--gold); display: none; }
        .scan-container { position: relative; width: 100%; }
        #scanner-line { display: none; position: absolute; top: 0; width: 100%; height: 4px; background: var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 10; animation: scanMove 2s linear infinite; }
        @keyframes scanMove { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .report-item { background: #1a1a1a; padding: 12px; border-radius: 10px; border-top: 3px solid var(--gold); text-align: center; }
        .footer { font-size: 10px; color: #444; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="splash">
    <div class="logo-box"><div style="font-size:40px; color:var(--neon); font-weight:bold;">X KING AI</div></div>
</div>

<header><h1>X KING AI <span style="font-size:12px; color:var(--gold);">PATTERN MATCH V10</span></h1></header>

<div class="container">
    <div class="card">
        <h3 style="color:var(--neon)">1. डेटाबेस मेमोरी (Max 5)</h3>
        <p style="font-size:12px; color:#666;">पैटर्न मैच करने के लिए केवल 5 फोटो चुनें।</p>
        <label class="custom-file">
            <span id="trainText">📁 पुरानी 5 फोटोस चुनें</span>
            <input type="file" id="trainInput" multiple accept="image/*">
        </label>
        <div id="dbStatus" style="font-size:11px; margin-top:10px; color: #555;">मेमोरी खाली है।</div>
    </div>

    <div class="card">
        <h3 style="color:var(--gold)">2. एनालिसिस</h3>
        <label class="custom-file" style="border-color: var(--gold);">
            <span id="predictText">📷 आज का चार्ट अपलोड करें</span>
            <input type="file" id="predictInput" accept="image/*">
        </label>
        <button id="analyzeBtn">मैचिंग और जनरेट करें</button>
    </div>

    <div class="scan-container">
        <div id="scanner-line"></div>
        <canvas id="outputCanvas"></canvas>
    </div>

    <div id="report" style="display:none;" class="card">
        <h3 style="color:#00ff00; border-bottom:1px solid #333; padding-bottom:10px;">अध्यक्ष प्रमाणित रिपोर्ट</h3>
        <div class="report-grid" id="reportGrid"></div>
    </div>

    <div class="footer">चेतावनी: यह टूल केवल ऐतिहासिक पैटर्न विश्लेषण के लिए है।</div>
</div>

<script>
    setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 2000);

    let memoryEntropy = 0;
    const trainInput = document.getElementById('trainInput');
    const predictInput = document.getElementById('predictInput');
    const analyzeBtn = document.getElementById('analyzeBtn');

    // --- 1. मेमोरी में केवल 5 फोटो का लॉजिक ---
    trainInput.onchange = (e) => {
        let files = Array.from(e.target.files);
        
        if(files.length > 5) {
            alert("सिस्टम मेमोरी केवल 5 फोटो ही संभाल सकती है! कृपया दोबारा चुनें।");
            trainInput.value = "";
            return;
        }

        memoryEntropy = files.reduce((acc, f) => acc + (f.size % 999), 0);
        document.getElementById('dbStatus').innerHTML = `<b style="color:#00ff00">मेमोरी लॉक:</b> ${files.length}/5 फोटो एक्टिव। कोड: ${memoryEntropy}`;
        document.getElementById('trainText').innerText = files.length + " फोटो स्टोर हुईं";
    };

    predictInput.onchange = () => {
        if(memoryEntropy === 0) { alert("पहले 5 डेटाबेस फोटो लोड करें!"); return; }
        analyzeBtn.style.display = "block";
    };

    // --- 2. पैटर्न मैचिंग और जनरेशन ---
    analyzeBtn.onclick = () => {
        const file = predictInput.files[0];
        const scanLine = document.getElementById('scanner-line');
        analyzeBtn.disabled = true;
        analyzeBtn.innerText = "मेमोरी से पैटर्न मैच हो रहा है...";

        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('outputCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                canvas.style.display = "block";
                scanLine.style.display = "block";
                ctx.drawImage(img, 0, 0);

                // पिक्सेल डेटा से करंट चार्ट का पैटर्न निकालना
                const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let currentPattern = 0;
                for(let i=0; i<data.length; i+=500) { currentPattern += data[i] + data[i+1]; }

                setTimeout(() => {
                    scanLine.style.display = "none";
                    processResults(ctx, img.width, img.height, currentPattern);
                    analyzeBtn.disabled = false;
                    analyzeBtn.innerText = "स्कैन पूरा हुआ";
                    document.getElementById('report').style.display = "block";
                }, 2500);
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function processResults(ctx, w, h, currentPattern) {
        // मेमोरी एंट्रॉपी और करंट पैटर्न का मिलन (यही नंबर बदलता है)
        const masterKey = currentPattern + memoryEntropy;
        
        const locs = [
            { name: "गली (GL)", s: 17, x: w * 0.55, y: h * 0.72 },
            { name: "दिसावर (DS)", s: 23, x: w * 0.78, y: h * 0.72 },
            { name: "फरीदाबाद (FB)", s: 31, x: w * 0.55, y: h * 0.85 },
            { name: "गाजियाबाद (GB)", s: 37, x: w * 0.78, y: h * 0.85 }
        ];

        const grid = document.getElementById('reportGrid');
        grid.innerHTML = "";

        // अध्यक्ष का स्टैम्प
        ctx.fillStyle = "#00ff00"; ctx.font = "bold 24px Arial";
        ctx.fillText("अध्यक्ष प्रमाणित", w * 0.05, h * 0.12);

        locs.forEach(l => {
            // शुद्ध पैटर्न आधारित नंबर (पूरी तरह से यूनिक)
            let n = Math.floor((Math.abs(Math.sin(masterKey * l.s)) * 10000) % 90) + 10;
            
            // ड्रा ऑन चार्ट
            ctx.fillStyle = "gold"; ctx.fillRect(l.x, l.y-45, 80, 55);
            ctx.fillStyle = "#000"; ctx.font = "bold 38px Arial";
            ctx.fillText(n, l.x+15, l.y);

            grid.innerHTML += `<div class="report-item"><span>${l.name}</span><br><b>${n}</b></div>`;
        });
    }
</script>
</body>
</html>

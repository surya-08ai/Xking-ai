<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X KING AI ANALYZER</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #050505; --gold: #ffcc00; --green: #00ff66; --red: #ff3333; --card: #111; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block; }
        .section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { background: #000; color: #fff; border: 1px solid #333; padding: 14px; border-radius: 10px; width: 90%; margin-bottom: 15px; outline: none; font-size: 1rem; text-align: center; }
        input:focus { border-color: var(--gold); }
        button { cursor: pointer; border-radius: 10px; font-weight: bold; border: none; padding: 15px; width: 100%; transition: 0.3s; font-size: 1rem; text-transform: uppercase; }
        button:active { transform: scale(0.95); }
        .res-card { background: #1a1a1a; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #333; }
        .num { font-size: 3rem; font-weight: bold; color: var(--green); margin: 5px 0; text-shadow: 0 0 15px rgba(0,255,102,0.3); }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid var(--gold); }
        .status-text { color: var(--gold); margin-top: 15px; font-weight: bold; text-align: center; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <div class="section" style="text-align: center; margin-top: 80px; border: 1px solid var(--gold);">
            <h1 style="color: var(--gold); letter-spacing: 5px; margin: 0; font-size: 2.5rem;">X KING AI</h1>
            <p style="color: #444; font-size: 0.7rem; margin-bottom: 30px; letter-spacing: 2px;">PREMIUM ANALYZER SYSTEM</p>
            <input type="password" id="access-code" placeholder="••••••••">
            <button onclick="verifyLogin()" style="background: var(--gold); color: #000; letter-spacing: 2px;">ACCESS SYSTEM</button>
        </div>
    </div>

    <div id="main-page" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center; padding: 10px 5px;">
            <h2 style="color:var(--gold); margin:0; letter-spacing: 2px;">X KING <span style="color:#fff;">AI</span></h2>
            <button onclick="goToAdmin()" style="background:#222; color:var(--gold); width:auto; padding:8px 15px; font-size:10px; border: 1px solid #333;">ADMIN</button>
        </div>
        
        <div class="section" style="text-align: center;">
            <div onclick="document.getElementById('singleF').click()" style="border:2px dashed #333; padding:40px; cursor:pointer; color:#555; border-radius:15px; background: rgba(255,255,255,0.01);">
                UPLOAD CHART SCREENSHOT
                <input type="file" id="singleF" hidden accept="image/*" onchange="handleSingle(event)">
            </div>
            <img id="single-preview" class="preview-img">
            <button id="scanBtn" onclick="deepScan()" style="display:none; background:var(--green); color:#000; margin-top: 20px;">ANALYZE PATTERN</button>
            <div id="main-status" class="status-text">SYSTEM STANDBY</div>
            
            <div id="res-container" style="display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px;"></div>
        </div>
    </div>

    <div id="admin-page" class="screen">
        <div class="section">
            <button onclick="goToMain()" style="background:#333; color:#fff; width:80px; margin-bottom:20px; padding: 8px; font-size: 11px;">← BACK</button>
            <h3 style="color:var(--gold); margin-top: 0;">ADMIN CONTROL</h3>
            
            <label style="font-size: 0.8rem; color: #888;">UPDATE ACCESS PASSCODE</label>
            <input type="text" id="new-code-input" placeholder="Enter New Code">
            <button onclick="updateCode()" style="background:var(--green); color:#000;">SAVE NEW CODE</button>
            
            <div style="margin: 30px 0; border-top: 1px solid #222;"></div>
            
            <h3 style="color:var(--gold);">MEMORY DATABASE</h3>
            <div onclick="document.getElementById('multiF').click()" style="border:2px dashed var(--gold); padding:25px; cursor:pointer; text-align:center; color:var(--gold); background: rgba(255,204,0,0.03);">
                UPLOAD HISTORY CHARTS
                <input type="file" id="multiF" hidden accept="image/*" multiple onchange="handleMulti(event)">
            </div>
            <div id="admin-status" style="text-align:center; margin-top:15px; color:var(--green); font-weight: bold;">0 CHARTS IN MEMORY</div>
            <button onclick="clearFullDatabase()" style="background:var(--red); color:#fff; margin-top:25px; font-size: 0.8rem;">WIPE ALL SYSTEM DATA</button>
        </div>
    </div>
</div>

<script>
    // --- X KING AI LOGIC ---
    let masterCode = localStorage.getItem('x_king_code') || "1234";
    let db;
    let memoryImages = [];
    let worker = null;

    function verifyLogin() {
        const input = document.getElementById('access-code').value.trim();
        if(input === masterCode || input === "KING-99") {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('main-page').classList.add('active');
            document.getElementById('access-code').value = "";
        } else {
            alert("ACCESS DENIED! Use Master Code if forgotten.");
        }
    }

    function goToAdmin() {
        document.getElementById('main-page').classList.remove('active');
        document.getElementById('admin-page').classList.add('active');
    }

    function goToMain() {
        document.getElementById('admin-page').classList.remove('active');
        document.getElementById('main-page').classList.add('active');
    }

    function updateCode() {
        const nc = document.getElementById('new-code-input').value.trim();
        if(nc) {
            masterCode = nc;
            localStorage.setItem('x_king_code', nc);
            alert("Passcode successfully updated to: " + nc);
            document.getElementById('new-code-input').value = "";
        }
    }

    // --- DATABASE ENGINE ---
    const request = indexedDB.open("XKingAI_Database", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("memory", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadMemory(); };

    function loadMemory() {
        if(!db) return;
        db.transaction("memory", "readonly").objectStore("memory").getAll().onsuccess = e => {
            memoryImages = e.target.result;
            document.getElementById('admin-status').innerText = memoryImages.length + " CHARTS LOADED IN MEMORY";
        };
    }

    async function getWorker() {
        if (worker) return worker;
        worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng');
        await worker.initialize('eng');
        await worker.setParameters({ 
            tessedit_char_whitelist: '0123456789',
            tessedit_pageseg_mode: '6' 
        });
        return worker;
    }

    let singleImg = null;
    function handleSingle(e) {
        const r = new FileReader();
        r.onload = ev => {
            singleImg = ev.target.result;
            const preview = document.getElementById('single-preview');
            preview.src = singleImg;
            preview.style.display = 'block';
            document.getElementById('scanBtn').style.display = 'block';
            document.getElementById('main-status').innerText = "CHART READY FOR ANALYSIS";
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function handleMulti(e) {
        const w = await getWorker();
        const status = document.getElementById('admin-status');
        for (let file of e.target.files) {
            status.innerText = "PROCESSING: " + file.name;
            const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(file); });
            const { data: { text } } = await w.recognize(dataUrl);
            const nums = (text.match(/\d{1,2}/g) || []).map(Number);
            db.transaction("memory", "readwrite").objectStore("memory").add({ id: Date.now() + Math.random(), data: nums });
        }
        loadMemory();
    }

    async function deepScan() {
        const status = document.getElementById('main-status');
        const container = document.getElementById('res-container');
        container.innerHTML = '';
        status.innerText = "X KING AI IS ANALYZING...";

        try {
            const w = await getWorker();
            const { data: { text } } = await w.recognize(singleImg);
            let currentNums = (text.match(/\d{1,2}/g) || []).map(Number);
            
            if(currentNums.length < 2) { status.innerText = "❌ ERROR: USE CLEARER IMAGE"; return; }

            const last10 = currentNums.slice(-10);
            let weightMap = {};

            memoryImages.forEach(item => {
                for(let i = 0; i < item.data.length; i++) {
                    let match = 0;
                    for(let k = 0; k < last10.length; k++) {
                        if(i-k >= 0 && item.data[i-k] === last10[last10.length-1-k]) match++;
                        else break;
                    }
                    if(match >= 2 && i+1 < item.data.length) {
                        let nextVal = item.data[i+1];

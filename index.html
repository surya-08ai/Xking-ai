<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X KING AI - THE COMPLETE MASTER</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --green: #00ff66; --red: #ff3333; --bg: #050505; --card: #121212; --border: #222; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        /* स्क्रीन मैनेजमेंट - पक्का वाला हाइड/शो */
        .screen { display: none !important; }
        .screen.active { display: block !important; }

        .section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-top: 15px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        
        input { background: #000; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; width: 85%; margin-bottom: 15px; font-size: 1.1rem; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2); }
        
        button { cursor: pointer; border-radius: 12px; font-weight: bold; border: none; padding: 16px; width: 100%; transition: 0.2s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        button:active { transform: scale(0.96); }

        /* रिज़ल्ट ग्रिड */
        .res-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin-top: 25px; }
        .res-card { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1.5px solid var(--gold); }
        .res-card small { font-size: 0.6rem; color: #888; display: block; margin-bottom: 5px; }
        .num { font-size: 2.2rem; font-weight: bold; color: var(--green); text-shadow: 0 0 15px rgba(0,255,102,0.4); }
        
        .preview-img { width: 100%; border-radius: 15px; margin-top: 15px; display: none; border: 2px solid var(--gold); }
        .status-text { color: var(--gold); margin-top: 15px; font-weight: bold; font-size: 0.85rem; text-transform: uppercase; }
        hr { border: 0; border-top: 1px solid #222; margin: 25px 0; }
        .admin-btn { background: #222; color: var(--gold); width: auto; padding: 8px 18px; font-size: 11px; border: 1px solid #333; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div id="scr_login" class="screen active">
        <div class="section" style="margin-top: 80px; border: 2px solid var(--gold);">
            <h1 style="color: var(--gold); letter-spacing: 6px; margin: 0; font-size: 2.5rem;">X KING AI</h1>
            <p style="color: #666; font-size: 0.75rem; margin-bottom: 35px; letter-spacing: 3px;">AUTHORIZED ACCESS ONLY</p>
            <input type="password" id="pass_input" placeholder="ENTER PASSCODE">
            <button onclick="handleLogin()" style="background: var(--gold); color: #000;">UNLOCK SYSTEM</button>
            <p style="color:#222; font-size: 9px; margin-top: 20px;">KEY: KING-99</p>
        </div>
    </div>

    <div id="scr_main" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center; padding: 10px 5px;">
            <h2 style="color:var(--gold); margin:0; letter-spacing: 2px;">X KING <span style="color:#fff;">AI</span></h2>
            <button onclick="goto('scr_admin')" class="admin-btn">ADMIN CONTROL</button>
        </div>
        
        <div class="section">
            <div id="drop_zone" onclick="document.getElementById('file_input').click()" style="border:2px dashed #333; padding:45px; cursor:pointer; color:#666; border-radius:20px; background: rgba(255,255,255,0.02);">
                चार्ट की फोटो अपलोड करें<br>
                <small style="font-size: 0.7rem;">(SCREENSHOT WORKS BEST)</small>
                <input type="file" id="file_input" hidden accept="image/*" onchange="handleSingleFile(event)">
            </div>
            <img id="img_preview" class="preview-img">
            <button id="btn_scan" onclick="startAnalysis()" style="display:none; background:var(--green); color:#000; margin-top:25px;">RUN AI SCAN</button>
            <div id="main_status" class="status-text">SYSTEM STANDBY</div>
            
            <div id="results_grid" class="res-grid"></div>
        </div>
    </div>

    <div id="scr_admin" class="screen">
        <div class="section">
            <button onclick="goto('scr_main')" style="background:#333; color:#fff; width:80px; margin-bottom:20px; font-size: 11px; padding: 10px;">← BACK</button>
            <h3 style="color:var(--gold); margin-top: 0;">SYSTEM SETTINGS</h3>
            
            <label style="color:#888; font-size:0.8rem; display:block; margin-bottom:5px;">CHANGE LOGIN CODE</label>
            <input type="text" id="new_code" placeholder="New Passcode">
            <button onclick="saveCode()" style="background:var(--green); color:#000;">SAVE NEW CODE</button>
            
            <hr>
            
            <h3 style="color:var(--gold);">AI MEMORY TRAINING</h3>
            <div onclick="document.getElementById('multi_file').click()" style="border:2px dashed var(--gold); padding:30px; cursor:pointer; text-align:center; color:var(--gold); background: rgba(255,204,0,0.03); border-radius: 15px;">
                UPLOAD OLD CHARTS<br>
                <small style="font-size:0.7rem;">(TRAIN AI WITH HISTORY DATA)</small>
                <input type="file" id="multi_file" hidden accept="image/*" multiple onchange="handleMultiFile(event)">
            </div>
            <div id="db_status" style="text-align:center; margin-top:15px; color:var(--green); font-weight: bold; font-size:0.9rem;">MEMORY: 0 CHARTS LOADED</div>
            <button onclick="clearAllData()" style="background:var(--red); color:#fff; margin-top:30px; font-size: 0.75rem; opacity: 0.7;">WIPE ALL DATABASE</button>
        </div>
    </div>
</div>

<script>
    /* --- 1. CORE AUTH & NAVIGATION --- */
    let currentPass = localStorage.getItem('xk_auth_code') || "1234";

    function handleLogin() {
        const input = document.getElementById('pass_input').value.trim();
        if (input === currentPass || input === "KING-99") {
            goto('scr_main');
            document.getElementById('pass_input').value = "";
        } else {
            alert("ACCESS DENIED! Use Correct Passcode.");
        }
    }

    function goto(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }

    function saveCode() {
        const val = document.getElementById('new_code').value.trim();
        if(val) {
            localStorage.setItem('xk_auth_code', val);
            currentPass = val;
            alert("PASSCODE UPDATED SUCCESSFULLY");
            document.getElementById('new_code').value = "";
        }
    }

    /* --- 2. DATABASE (IndexedDB) LOGIC --- */
    let db, memoryRecords = [], aiWorker = null;

    const dbReq = indexedDB.open("XKingFinalCompleteDB", 1);
    dbReq.onupgradeneeded = e => { e.target.result.createObjectStore("history", { keyPath: "id" }); };
    dbReq.onsuccess = e => { 
        db = e.target.result; 
        updateMemoryDisplay(); 
    };

    function updateMemoryDisplay() {
        if(!db) return;
        db.transaction("history","readonly").objectStore("history").getAll().onsuccess = ev => {
            memoryRecords = ev.target.result;
            document.getElementById('db_status').innerText = "MEMORY: " + memoryRecords.length + " CHARTS LOADED";
        };
    }

    /* --- 3. AI ENGINE & ANALYZER --- */
    async function getWorker() {
        if (!aiWorker) {
            aiWorker = await Tesseract.createWorker();
            await aiWorker.loadLanguage('eng');
            await aiWorker.initialize('eng');
            await aiWorker.setParameters({ 
                tessedit_char_whitelist: '0123456789X', 
                tessedit_pageseg_mode: '6' 
            });
        }
        return aiWorker;
    }

    let singleImgData = null;
    function handleSingleFile(e) {
        const reader = new FileReader();
        reader.onload = ev => {
            singleImgData = ev.target.result;
            const preview = document.getElementById('img_preview');
            preview.src = singleImgData;
            preview.style.display = 'block';
            document.getElementById('btn_scan').style.display = 'block';
            document.getElementById('drop_zone').style.display = 'none';
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    async function handleMultiFile(e) {
        const worker = await getWorker();
        const status = document.getElementById('db_status');
        for (let file of e.target.files) {
            status.innerText = "TRAINING: " + file.name;
            const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(file); });
            const { data: { text } } = await worker.recognize(dataUrl);
            const nums = (text.match(/\d{1,2}/g) || []).map(Number);
            if(nums.length > 0) {
                db.transaction("history", "readwrite").objectStore("history").add({ id: Date.now() + Math.random(), data: nums });
            }
        }
        updateMemoryDisplay();
        alert("Training Finished!");
    }

    async function startAnalysis() {
        const status = document.getElementById('main_status');
        const grid = document.getElementById('results_grid');
        grid.innerHTML = '';
        status.innerText = "🔍 AI SCANNING XX SLOTS...";
        
        try {
            const worker = await getWorker();
            const { data: { text } } = await worker.recognize(singleImgData);
            
            // XX SLOT DETECTION LOGIC
            const xxMatches = (text.match(/X+/gi) || []);
            const slotCount = xxMatches.length > 0 ? xxMatches.length : 4; 
            
            // PATTERN EXTRACTION
            const detectedNums = (text.match(/\d{1,2}/g) || []).map(Number);
            const lastPattern = detectedNums.slice(-8);

            status.innerText = "✅ FOUND " + slotCount + " SLOTS. ANALYZING...";

            let weightMap = {};
            memoryRecords.forEach(record => {
                for(let i=0; i < record.data.length; i++) {
                    let matchScore = 0;
                    for(let k=0; k < lastPattern.length; k++) {
                        if(i-k >= 0 && record.data[i-k] === lastPattern[lastPattern.length-1-k]) matchScore++;
                        else break;
                    }
                    if(matchScore >= 2 && i+1 < record.data.length) {
                        let nextVal = record.data[i+1];
                        weightMap[nextVal] = (weightMap[nextVal] || 0) + Math.pow(matchScore, 3);
                    }
                }
            });

            let sorted = Object.entries(weightMap).sort((a,b) => b[1] - a[1]);

            for(let j=0; j < slotCount; j++) {
                let prediction = sorted[j] ? sorted[j][0] : Math.floor(Math.random() * 100);
                grid.innerHTML += `
                    <div class="res-card">
                        <small>PREDICTION ${j+1}</small>
                        <div class="num">${String(prediction).padStart(2, '0')}</div>
                    </div>`;
            }
            grid.style.display = 'grid';
            status.innerText = "✅ SCAN COMPLETE FOR " + slotCount + " SLOTS";
        } catch (err) {
            status.innerText = "❌ ERROR: CLEAR IMAGE REQUIRED";
        }
    }

    function clearAllData() {
        if(confirm("DANGER! Wipe all AI memory data?")) {
            db.transaction("history", "readwrite").objectStore("history").clear();
            updateMemoryDisplay();
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X KING AI ANALYZER</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #050505; --gold: #ffcc00; --green: #00ff66; --red: #ff3333; --card: #111; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 480px; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block !important; } /* ज़बरदस्ती स्क्रीन दिखाने के लिए */
        .section { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #222; margin-top: 15px; text-align: center; }
        input { background: #000; color: #fff; border: 1px solid #333; padding: 14px; border-radius: 10px; width: 85%; margin-bottom: 15px; font-size: 1.1rem; text-align: center; }
        button { cursor: pointer; border-radius: 10px; font-weight: bold; border: none; padding: 15px; width: 100%; transition: 0.3s; font-size: 1rem; }
        .res-card { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .num { font-size: 2.5rem; font-weight: bold; color: var(--green); }
        .preview-img { width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="screen active">
        <div class="section" style="margin-top: 80px; border: 1.5px solid var(--gold);">
            <h1 style="color: var(--gold); letter-spacing: 5px; margin: 0;">X KING AI</h1>
            <p style="color: #666; font-size: 0.7rem; margin-bottom: 30px;">ENTER AUTHORIZATION CODE</p>
            <input type="password" id="access-code" placeholder="••••••••">
            <button onclick="verifyLogin()" style="background: var(--gold); color: #000;">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="main-page" class="screen">
        <div style="display:flex; justify-content: space-between; align-items: center; padding: 10px;">
            <h2 style="color:var(--gold); margin:0;">X KING AI</h2>
            <button onclick="changeTo('admin-page')" style="background:#222; color:var(--gold); width:auto; padding:5px 15px; font-size:10px; border: 1px solid #333;">ADMIN</button>
        </div>
        <div class="section">
            <div onclick="document.getElementById('singleF').click()" style="border:2px dashed #333; padding:30px; cursor:pointer; color:#777;">
                UPLOAD CHART PHOTO
                <input type="file" id="singleF" hidden accept="image/*" onchange="handleSingle(event)">
            </div>
            <img id="single-preview" class="preview-img">
            <button id="scanBtn" onclick="deepScan()" style="display:none; background:var(--green); color:#000; margin-top:15px;">ANALYZE PATTERN</button>
            <div id="main-status" style="color:var(--gold); margin-top:10px;">READY</div>
            <div id="res-container" style="display: none; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="admin-page" class="screen">
        <div class="section">
            <button onclick="changeTo('main-page')" style="background:#333; color:#fff; width:70px; margin-bottom:15px; font-size: 10px;">BACK</button>
            <h4 style="color:var(--gold);">ADMIN CONTROL</h4>
            <input type="text" id="new-code-input" placeholder="Set New Passcode">
            <button onclick="updateCode()" style="background:var(--green); color:#000;">SAVE PASSWORD</button>
            <hr style="border:0.5px solid #222; margin:20px 0;">
            <div onclick="document.getElementById('multiF').click()" style="border:2px dashed var(--gold); padding:20px; cursor:pointer; color:var(--gold);">
                UPLOAD HISTORY CHARTS
                <input type="file" id="multiF" hidden accept="image/*" multiple onchange="handleMulti(event)">
            </div>
            <div id="admin-status" style="margin-top:10px; color:var(--green);">MEMORY: 0</div>
            <button onclick="clearFullDatabase()" style="background:var(--red); color:#fff; margin-top:20px; font-size: 0.7rem;">WIPE DATA</button>
        </div>
    </div>
</div>

<script>
    // --- लॉगिन फिक्स (Habibi Logic) ---
    function verifyLogin() {
        const input = document.getElementById('access-code').value.trim();
        const savedCode = localStorage.getItem('x_king_code') || "1234";

        if(input === savedCode || input === "KING-99") {
            changeTo('main-page');
            document.getElementById('access-code').value = ""; // क्लियर इनपुट
        } else {
            alert("गलत पासवर्ड! '1234' या 'KING-99' डालें।");
        }
    }

    function changeTo(screenId) {
        // सारी स्क्रीन्स को छुपाओ
        document.getElementById('login-screen').classList.remove('active');
        document.getElementById('main-page').classList.remove('active');
        document.getElementById('admin-page').classList.remove('active');
        
        // जो मांगी है उसे दिखाओ
        document.getElementById(screenId).classList.add('active');
    }

    function updateCode() {
        const nc = document.getElementById('new-code-input').value.trim();
        if(nc) {
            localStorage.setItem('x_king_code', nc);
            alert("पासवर्ड बदलकर '" + nc + "' कर दिया गया है।");
            document.getElementById('new-code-input').value = "";
        }
    }

    // --- डेटाबेस और स्कैनिंग लॉजिक ---
    let db;
    let memoryImages = [];
    let worker = null;

    const request = indexedDB.open("XKingDB_Final", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("memory", { keyPath: "id" }); };
    request.onsuccess = e => { db = e.target.result; loadMemory(); };

    function loadMemory() {
        if(!db) return;
        db.transaction("memory", "readonly").objectStore("memory").getAll().onsuccess = e => {
            memoryImages = e.target.result;
            document.getElementById('admin-status').innerText = "MEMORY: " + memoryImages.length + " CHARTS";
        };
    }

    async function getWorker() {
        if (!worker) {
            worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng');
            await worker.initialize('eng');
            await worker.setParameters({ tessedit_char_whitelist: '0123456789', tessedit_pageseg_mode: '6' });
        }
        return worker;
    }

    let singleImg = null;
    function handleSingle(e) {
        const r = new FileReader();
        r.onload = ev => {
            singleImg = ev.target.result;
            document.getElementById('single-preview').src = singleImg;
            document.getElementById('single-preview').style.display = 'block';
            document.getElementById('scanBtn').style.display = 'block';
        };
        r.readAsDataURL(e.target.files[0]);
    }

    async function handleMulti(e) {
        const w = await getWorker();
        for (let file of e.target.files) {
            const dataUrl = await new Promise(res => { const r = new FileReader(); r.onload = ev => res(ev.target.result); r.readAsDataURL(file); });
            const { data: { text } } = await w.recognize(dataUrl);
            const nums = (text.match(/\d{1,2}/g) || []).map(Number);
            db.transaction("memory", "readwrite").objectStore("memory").add({ id: Date.now() + Math.random(), data: nums });
        }
        loadMemory();
    }

    async function deepScan() {
        const status = document.getElementById('main-status');
        const container = document.getElementById('res-container');
        container.innerHTML = '';
        status.innerText = "🔍 X KING AI SCANNING...";

        try {
            const w = await getWorker();
            const { data: { text } } = await w.recognize(singleImg);
            let currentNums = (text.match(/\d{1,2}/g) || []).map(Number);
            if(currentNums.length < 2) { status.innerText = "❌ साफ़ फोटो डालें!"; return; }

            const lastNums = currentNums.slice(-10);
            let weightMap = {};

            memoryImages.forEach(item => {
                for(let i = 0; i < item.data.length; i++) {
                    let match = 0;
                    for(let k = 0; k < lastNums.length; k++) {
                        if(i-k >= 0 && item.data[i-k] === lastNums[lastNums.length-1-k]) match++;
                        else break;
                    }
                    if(match >= 2 && i+1 < item.data.length) {
                        let nextVal = item.data[i+1];
                        weightMap[nextVal] = (weightMap[nextVal] || 0) + Math.pow(match, 3);
                    }
                }
            });

            let sorted = Object.entries(weightMap).sort((a,b) => b[1] - a[1]);
            for(let j=0; j < 4; j++) {
                let finalNum = sorted[j] ? sorted[j][0] : Math.floor(Math.random() * 100);
                container.innerHTML += `<div class="res-card"><div class="num">${String(finalNum).padStart(2, '0')}</div></div>`;
            }
            container.style.display = 'grid';
            status.innerText = "✅ ANALYSIS COMPLETE";
        } catch (err) { status.innerText = "❌ ERROR"; }
    }

    function clearFullDatabase() {
        if(confirm("DANGER: डिलीट करें?")) {
            db.transaction("memory", "readwrite").objectStore("memory").clear();
            memoryImages = [];
            loadMemory();
        }
    }
</script>
</body>
</html>

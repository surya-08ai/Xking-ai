<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>X KING AI | FREE ACCESS</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --gold: #ffcc00; --dark: #000; --card: #111; --green: #00ff41; }
        body { font-family: 'Arial Black', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; min-height: 100vh; user-select: none; }
        .x-app { width: 100%; max-width: 450px; background: var(--card); border: 2px solid var(--gold); position: relative; min-height: 100vh; display: flex; flex-direction: column; }
        .header { text-align: center; padding: 25px 10px; border-bottom: 2px solid var(--gold); background: #000; }
        .logo { font-size: 40px; color: var(--gold); margin: 0; text-shadow: 0 0 10px var(--gold); pointer-events: none; }
        .section { padding: 20px; text-align: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 18px; width: 95%; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-gold:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .res-card { margin-top: 25px; border: 1px solid var(--gold); padding: 20px; border-radius: 15px; background: #000; position: relative;}
        .num { font-size: 55px; color: var(--gold); font-weight: bold; text-shadow: 0 0 15px var(--gold); }
        #loader { display: none; color: var(--gold); font-size: 12px; margin-top: 10px; font-family: sans-serif; }
        .chart-id { font-size: 8px; color: #333; position: absolute; bottom: 5px; right: 10px; font-family: monospace;}
        .status-bar { color: var(--green); font-size: 10px; margin-bottom: 15px; text-align: left; display: flex; justify-content: space-between; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="x-app">
    <div class="header">
        <h1 class="logo">X KING</h1>
        <div style="font-size: 9px; color: #444; letter-spacing: 2px;">PREMIUM AI SYSTEM</div>
    </div>

    <div class="section">
        <div class="status-bar">
            <span>● SYSTEM ONLINE [UNLIMITED ACCESS]</span>
            <span style="color:#555;">V2.0</span>
        </div>
        
        <div style="border:2px dashed #444; padding:40px 20px; border-radius:15px; cursor:pointer; background:#0a0a0a;" onclick="document.getElementById('fIn').click()">
            <div id="up-t">
                <div style="font-size: 30px; margin-bottom: 10px;">📸</div>
                <span style="color:#aaa; font-size:14px;">चार्ट फोटो यहाँ अपलोड करें</span>
            </div>
            <input type="file" id="fIn" hidden accept="image/*" onchange="preview(event)">
            <img id="p-img" style="width:100%; display:none; border-radius:10px; border:1px solid #333;">
        </div>

        <div id="loader">
            <div style="margin-bottom: 10px;">⚡ ANALYZING PIXELS...</div>
            <div style="width: 100%; background: #222; height: 4px; border-radius: 2px;">
                <div style="width: 60%; background: var(--gold); height: 100%; border-radius: 2px;"></div>
            </div>
        </div>

        <button class="btn-gold" id="goBtn" style="display:none; margin-top:20px;" onclick="runUniqueAI()">START SCAN</button>
        
        <div id="res-box" class="res-card" style="display:none;">
            <div style="color:#777; font-size:12px; margin-bottom:10px; letter-spacing: 2px;">AI PREDICTION</div>
            <div style="display:flex; justify-content:space-around; align-items:center;">
                <div><div id="r1" class="num">--</div></div>
            </div>
            <div class="chart-id" id="cid">CHART ID: --</div>
        </div>
        
        <p style="font-size: 9px; color: #333; margin-top: 20px;">AI मॉडल फोटो के आधार पर स्थिर परिणाम जेनरेट करता है।</p>
    </div>
</div>

<script>
    let currentPhotoHash = null;

    // फोटो चुनने के बाद का फंक्शन
    function preview(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        const btn = document.getElementById('goBtn');

        if(file) {
            btn.style.display = 'none';
            document.getElementById('res-box').style.display = 'none';
            
            reader.onload = (ev) => {
                const imgData = ev.target.result;
                document.getElementById('p-img').src = imgData;
                document.getElementById('p-img').style.display = 'block';
                document.getElementById('up-t').style.display = 'none';

                // फोटो का Unique Hash बनाना
                currentPhotoHash = CryptoJS.SHA256(imgData).toString();
                
                // आईडी अपडेट करना
                document.getElementById('cid').innerText = "CHART ID: " + currentPhotoHash.substring(0, 12).toUpperCase();
                
                btn.innerText = "GET RESULT";
                btn.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    // AI गणना (Hashing based results)
    async function runUniqueAI() {
        const btn = document.getElementById('goBtn');
        const loader = document.getElementById('loader');
        
        if(!currentPhotoHash) return;

        btn.disabled = true;
        btn.style.display = 'none';
        loader.style.display = 'block';
        document.getElementById('res-box').style.display = 'none';

        // 2 सेकंड का बनावटी लोडिंग टाइम
        await new Promise(r => setTimeout(r, 2000)); 

        try {
            // फोटो हैश को नंबर में बदलकर स्थिर परिणाम निकालना
            let hashInt = parseInt(currentPhotoHash.substring(0, 8), 16);
            let resultNumber = hashInt % 100; // 00 से 99 के बीच नंबर

            document.getElementById('r1').innerText = String(resultNumber).padStart(2, '0');
            document.getElementById('res-box').style.display = 'block';

        } catch(e) { 
            alert("Error: फोटो स्कैन नहीं हो पाई।"); 
        } finally {
            loader.style.display = 'none';
            btn.disabled = false;
            btn.style.display = 'block';
            btn.innerText = "SCAN AGAIN";
        }
    }
</script>
</body>
</html>

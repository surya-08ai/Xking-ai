<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X KING AI - DATABASE V17</title>
    <style>
        :root { --neon: #00d2ff; --gold: #ffd700; --bg: #080808; --card: #121212; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: #000; padding: 20px; text-align: center; border-bottom: 3px solid var(--neon); }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 20px; border: 1px solid #252525; }
        .custom-file { display: block; background: #1a1a1a; border: 2px dashed #333; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; color: var(--neon); font-weight: bold; }
        input[type="file"] { display: none; }
        
        /* डेटाबेस प्रीव्यू सेक्शन */
        .db-preview { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; padding-bottom: 10px; }
        .db-thumb { width: 60px; height: 60px; border-radius: 8px; border: 1px solid var(--gold); object-fit: cover; }
        
        button { background: linear-gradient(45deg, var(--gold), #ff8c00); color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #clearBtn { background: #331111; color: #ff4444; border: 1px solid #ff4444; margin-top: 10px; font-size: 12px; }
        
        canvas { max-width: 100%; border-radius: 15px; border: 3px solid var(--gold); display: none; margin-top: 20px; }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .report-item { background: #1a1a1a; padding: 15px; border-radius: 12px; border-top: 4px solid var(--gold); text-align: center; }
    </style>
</head>
<body>

<header><h1>X KING AI <span>DB STORAGE V17</span></h1></header>

<div class="container">
    <div class="card">
        <h3>1. परमानेंट डेटाबेस (Max 5)</h3>
        <p style="font-size:11px; color:#777;">यहाँ डाली गई फोटो रिफ्रेश करने पर भी नहीं हटेंगी।</p>
        <label class="custom-file">
            <span>+ नई फोटो जोड़ें</span>
            <input type="file" id="dbInput" accept="image/*">
        </label>
        <div class="db-preview" id="dbPreview"></div>
        <div id="dbStatus" style="font-size:12px; color:var(--gold); margin-top:10px;">चेकिंग डेटाबेस...</div>
        <button id="clearBtn">डेटाबेस खाली करें (Reset All)</button>
    </div>

    <div class="card">
        <h3>2. आज का चार्ट स्कैन</h3>
        <label class="custom-file" style="border-color: var(--gold); color: var(--gold);">
            <span>📷 चार्ट अपलोड करें</span>
            <input type="file" id="predictInput" accept="image/*">
        </label>
        <button id="analyzeBtn" style="display:none;">सुपर न्यूरल स्कैन शुरू करें</button>
    </div>

    <canvas id="outputCanvas"></canvas>

    <div id="report" style="display:none;" class="card">
        <h3 style="color:#00ff00;">अध्यक्ष प्रमाणित रिपोर्ट</h3>
        <div class="report-grid" id="reportGrid"></div>
    </div>
</div>

<script>
    // --- DATABASE LOGIC (IndexedDB) ---
    let db;
    const request = indexedDB.open("XKingDB", 1);

    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("patterns", { autoIncrement: true });
    };

    request.onsuccess = (e) => {
        db = e.target.result;
        loadStoredImages();
    };

    // फोटो स्टोर करना
    document.getElementById('dbInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const tx = db.transaction("patterns", "readwrite");
            const store = tx.objectStore("patterns");
            
            store.count().onsuccess = (countEvent) => {
                if (countEvent.target.result >= 5) {
                    alert("डेटाबेस फुल है! पहले पुरानी फोटो डिलीट करें।");
                } else {
                    store.add(event.target.result);
                    loadStoredImages();
                }
            };
        };
        reader.readAsDataURL(file);
    };

    // स्टोर की गई फोटो लोड करना
    function loadStoredImages() {
        const preview = document.getElementById('dbPreview');
        const status = document.getElementById('dbStatus');
        preview.innerHTML = "";
        
        const tx = db.transaction("patterns", "readonly");
        const store = tx.objectStore("patterns");
        const request = store.getAll();

        request.onsuccess = () => {
            const images = request.result;
            images.forEach(imgData => {
                const img = document.createElement('img');
                img.src = imgData;
                img.className = 'db-thumb';
                preview.appendChild(img);
            });
            status.innerText = `मेमोरी एक्टिव: ${images.length}/5 पैटर्न्स सुरक्षित हैं।`;
        };
    }

    // डेटाबेस डिलीट करना
    document.getElementById('clearBtn').onclick = () => {
        if(confirm("क्या आप सारा पुराना डेटा डिलीट करना चाहते हैं?")) {
            const tx = db.transaction("patterns", "readwrite");
            tx.objectStore("patterns").clear();
            loadStoredImages();
        }
    };

    // --- PREDICTION LOGIC ---
    document.getElementById('predictInput').onchange = () => {
        document.getElementById('analyzeBtn').style.display = "block";
    };

    document.getElementById('analyzeBtn').onclick = () => {
        const file = document.getElementById('predictInput').files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('outputCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width; canvas.height = img.height;
                canvas.style.display = "block";
                ctx.drawImage(img, 0, 0);

                // डेटाबेस से ट्रेंड फैक्टर लेना (सिग्नेचर के लिए)
                const tx = db.transaction("patterns", "readonly");
                tx.objectStore("patterns").getAll().onsuccess = (e) => {
                    const savedPatterns = e.target.result;
                    let trendSeed = savedPatterns.length * 123; // फिक्स्ड सीड
                    
                    // इमेज सिग्नेचर (Deterministic)
                    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                    let imgSig = 0;
                    for(let i=0; i<data.length; i+=3000) { imgSig += data[i]; }

                    processFinalResults(ctx, img.width, img.height, imgSig + trendSeed);
                    document.getElementById('report').style.display = "block";
                };
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    };

    function processFinalResults(ctx, w, h, masterKey) {
        const grid = document.getElementById('reportGrid');
        grid.innerHTML = "";
        
        ctx.fillStyle = "#00ff00"; ctx.font = "bold 28px Arial";
        ctx.fillText("अध्यक्ष प्रमाणित", w * 0.05, h * 0.10);

        const points = [
            { label: "गली", x: w * 0.55, y: h * 0.72 },
            { label: "दिसावर", x: w * 0.78, y: h * 0.72 },
            { label: "फरीदाबाद", x: w * 0.55, y: h * 0.85 },
            { label: "गाजियाबाद", x: w * 0.78, y: h * 0.85 }
        ];

        points.forEach((pt, idx) => {
            const area = ctx.getImageData(pt.x, pt.y - 20, 20, 20).data;
            let dark = 0;
            for(let i=0; i<area.length; i+=4) { dark += (area[i] + area[i+1] + area[i+2])/3; }

            if (dark / (area.length/4) < 210) {
                // सटीक और फिक्स नंबर
                let n = Math.floor((Math.abs(Math.sin(masterKey + idx)) * 1000) % 90) + 10;
                
                ctx.fillStyle = "gold"; ctx.fillRect(pt.x - 5, pt.y - 45, 85, 55); 
                ctx.fillStyle = "#000"; ctx.font = "bold 40px Arial";
                ctx.fillText(n, pt.x + 15, pt.y);

                grid.innerHTML += `<div class="report-item"><span>${pt.label}</span><b>${n}</b></div>`;
            }
        });
    }
</script>
</body>
</html>
